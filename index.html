<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Cute 3D</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1>Calculadora 3D</h1>
  <div class="calculator">
    <div class="display">
      <input type="text" id="display" disabled />
    </div>
    <div class="buttons">
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="selectOperation('+')">+</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="selectOperation('-')">-</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button onclick="selectOperation('*')">×</button>

      <button onclick="appendNumber('0')">0</button>
      <button onclick="clearDisplay()">C</button>
      <button onclick="calculate()">=</button>
      <button onclick="selectOperation('/')">÷</button>
    </div>
  </div>

  <script src="calculadora.js"></script>
  <script>
    let currentInput = '';
    let previousInput = '';
    let currentOperation = null;

    function appendNumber(number) {
      currentInput += number;
      document.getElementById('display').value = currentInput;
    }

    function clearDisplay() {
      currentInput = '';
      previousInput = '';
      currentOperation = null;
      document.getElementById('display').value = '';
    }

    function selectOperation(operation) {
      if (currentInput === '') return;
      if (previousInput !== '') calculate();
      currentOperation = operation;
      previousInput = currentInput;
      currentInput = '';
    }

    function calculate() {
      const prev = parseFloat(previousInput);
      const curr = parseFloat(currentInput);
      if (isNaN(prev) || isNaN(curr)) return;
      let result;

      switch (currentOperation) {
        case '+': result = sumar(prev, curr); break;
        case '-': result = restar(prev, curr); break;
        case '*': result = multiplicar(prev, curr); break;
        case '/': result = dividir(prev, curr); break;
        default: return;
      }

      currentInput = result.toString();
      currentOperation = null;
      previousInput = '';
      document.getElementById('display').value = currentInput;
    }
  </script>
    <footer>
      Hecho con 💖 por Orli
    </footer>
</body>
</html>
